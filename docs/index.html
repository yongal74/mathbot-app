<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수능수학 조건분해트리</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #0f0f1a; color: #e0e0f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
    }
    .card {
      max-width: 480px; width: 100%;
      background: #16162a; border-radius: 24px;
      padding: 48px 40px; text-align: center;
    }
    h1 { font-size: 24px; font-weight: 800; color: #7c6cf8; margin-bottom: 10px; }
    p { font-size: 14px; color: #aaaacc; line-height: 1.7; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block; padding: 14px 20px;
      border: 1px solid #333360; border-radius: 14px;
      color: #aaaacc; text-decoration: none; font-size: 14px; font-weight: 600;
      transition: background .15s;
    }
    a:hover { background: #222240; color: #e0e0f0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>수능수학 조건분해트리</h1>
    <p>25년 수능 기출 750문제를<br>조건분해트리로 완전 정복</p>
    <div class="links">
      <a href="privacy.html">📄 개인정보처리방침</a>
      <a href="terms.html">📋 이용약관</a>
    </div>
  </div>
</body>
</html>
